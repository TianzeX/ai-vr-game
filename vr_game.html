<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR 光剑训练场 - 修复版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0,200,255,0.8);
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 28px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255,215,0,0.8);
        }
        #combo {
            position: absolute;
            top: 70px;
            right: 20px;
            color: #ff4444;
            font-size: 22px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #energy-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            z-index: 10;
            pointer-events: none;
            border: 2px solid rgba(255,255,255,0.5);
        }
        #energy-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            border-radius: 10px;
            transition: width 0.3s;
        }
        #boss-hp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 15px;
            background: rgba(255,0,0,0.3);
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
            display: none;
            border: 2px solid rgba(255,0,0,0.6);
        }
        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            border-radius: 8px;
            transition: width 0.3s;
        }
        #boss-name {
            position: absolute;
            top: calc(50% - 40px);
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 30px;
            z-index: 10;
            pointer-events: none;
            display: none;
            text-shadow: 0 0 20px rgba(255,0,0,0.8);
            letter-spacing: 4px;
        }
        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 36px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        #vr-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 20px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
            letter-spacing: 2px;
        }
        #vr-button:hover {
            background: #0088ff;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="info">⚔️ VR 光剑训练场</div>
    <div id="score">得分: 0</div>
    <div id="combo">弹反!</div>
    <div id="energy-bar"><div id="energy-fill"></div></div>
    <div id="boss-hp"><div id="boss-hp-fill"></div></div>
    <div id="boss-name">BOSS · 暗影水晶</div>
    <div id="message"></div>
    <div id="instructions">
        🗡️ 双手挥砍消灭红色敌人<br>
        🛡️ 挥剑弹反紫色能量球<br>
        ⚡ 积攒能量召唤 Boss<br>
        💥 双手交替挥砍击破 Boss
    </div>
    <button id="vr-button" onclick="enterVR()">进入 VR</button>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
        // 等待 A-Frame 场景加载完成再执行所有逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const scene = document.querySelector('a-scene');
            if (scene && scene.hasLoaded) {
                initGame();
            } else {
                scene.addEventListener('loaded', initGame);
            }
        });

        let score = 0;
        let energy = 0;
        let comboCount = 0;
        let bossActive = false;
        let bossHP = 100;
        let bossLastHitTime = 0;
        let bossHitCount = 0;
        let gameRunning = true;
        let lastRightSwing = false;
        let lastLeftSwing = false;
        let swingRhythmRight = false;

        let sceneEl;
        let scoreDisplay, comboDisplay, energyFill, bossHPBar, bossHPFill, bossName, message, instructions;

        function initGame() {
            sceneEl = document.querySelector('a-scene');
            scoreDisplay = document.getElementById('score');
            comboDisplay = document.getElementById('combo');
            energyFill = document.getElementById('energy-fill');
            bossHPBar = document.getElementById('boss-hp');
            bossHPFill = document.getElementById('boss-hp-fill');
            bossName = document.getElementById('boss-name');
            message = document.getElementById('message');
            instructions = document.getElementById('instructions');

            // 启动敌人生成循环
            setInterval(spawnEnemy, 2000);
            setInterval(spawnProjectile, 3000);

            // 初始生成几个敌人，让玩家立刻有东西打
            setTimeout(spawnEnemy, 500);
            setTimeout(spawnProjectile, 1000);
            setTimeout(spawnEnemy, 1200);
        }

        function enterVR() {
            document.getElementById('vr-button').style.display = 'none';
            instructions.style.display = 'none';
            if (sceneEl && sceneEl.renderer && sceneEl.renderer.xr) {
                sceneEl.enterVR();
            }
        }

        setInterval(() => {
            if (sceneEl && sceneEl.is('vr-mode')) {
                document.getElementById('vr-button').style.display = 'none';
                instructions.style.display = 'none';
            }
        }, 1000);

        function showMessage(text, duration = 2000) {
            if (!message) return;
            message.textContent = text;
            message.style.opacity = '1';
            setTimeout(() => {
                if (message) message.style.opacity = '0';
            }, duration);
        }

        function updateScore(points) {
            score += points;
            if (scoreDisplay) scoreDisplay.textContent = '得分: ' + score;
        }

        function updateEnergy(amount) {
            energy = Math.min(100, Math.max(0, energy + amount));
            if (energyFill) energyFill.style.width = energy + '%';
            if (energy >= 100 && !bossActive) {
                spawnBoss();
            }
        }

        function showCombo() {
            comboCount++;
            if (comboDisplay) {
                comboDisplay.textContent = comboCount >= 3 ? '🔥 ' + comboCount + ' 连击!' : '弹反!';
                comboDisplay.style.opacity = '1';
            }
            clearTimeout(window.comboTimeout);
            window.comboTimeout = setTimeout(() => {
                if (comboDisplay) comboDisplay.style.opacity = '0';
                comboCount = 0;
            }, 1500);
        }

        function spawnEnemy() {
            if (!gameRunning || bossActive || !sceneEl) return;

            const enemy = document.createElement('a-box');
            enemy.setAttribute('color', '#ff3333');
            enemy.setAttribute('width', '0.4');
            enemy.setAttribute('height', '0.4');
            enemy.setAttribute('depth', '0.4');
            const startX = Math.random() * 2 - 1;
            const startY = Math.random() * 1.5 + 0.5;
            enemy.setAttribute('position', `${startX} ${startY} -3`);
            enemy.setAttribute('material', 'emissive', '#ff0000');
            enemy.setAttribute('material', 'emissiveIntensity', '0.5');
            enemy.setAttribute('class', 'enemy');
            enemy.setAttribute('data-hp', '1');

            enemy.setAttribute('animation', {
                property: 'position',
                from: `${startX} ${startY} -3`,
                to: `${startX} ${startY} 1`,
                dur: 4000,
                easing: 'linear'
            });

            sceneEl.appendChild(enemy);

            setTimeout(() => {
                if (enemy.parentNode && !enemy.getAttribute('data-hit')) {
                    enemy.parentNode.removeChild(enemy);
                    updateScore(-5);
                }
            }, 4000);
        }

        function spawnProjectile() {
            if (!gameRunning || bossActive || !sceneEl) return;

            const ball = document.createElement('a-sphere');
            ball.setAttribute('radius', '0.15');
            ball.setAttribute('color', '#cc44ff');
            ball.setAttribute('material', 'emissive', '#8800ff');
            ball.setAttribute('material', 'emissiveIntensity', '0.8');
            const startX = Math.random() * 3 - 1.5;
            const startY = Math.random() * 2 + 0.3;
            ball.setAttribute('position', `${startX} ${startY} -4`);
            ball.setAttribute('class', 'projectile');
            ball.setAttribute('data-parried', 'false');

            ball.setAttribute('animation', {
                property: 'position',
                from: `${startX} ${startY} -4`,
                to: `${Math.random() * 2 - 1} ${Math.random() * 1.5 + 0.5} 0.5`,
                dur: 2500,
                easing: 'linear'
            });

            sceneEl.appendChild(ball);

            setTimeout(() => {
                if (ball.parentNode && ball.getAttribute('data-parried') !== 'true') {
                    ball.parentNode.removeChild(ball);
                }
            }, 2500);
        }

        function spawnBoss() {
            if (!sceneEl) return;
            bossActive = true;
            bossHP = 100;
            bossHitCount = 0;
            bossLastHitTime = 0;
            energy = 100;
            if (energyFill) energyFill.style.width = '100%';

            if (bossHPBar) bossHPBar.style.display = 'block';
            if (bossName) bossName.style.display = 'block';
            if (bossHPFill) bossHPFill.style.width = '100%';

            showMessage('⚡ Boss 出现了！双手交替挥砍！', 3000);

            document.querySelectorAll('.enemy, .projectile').forEach(el => {
                if (el.parentNode) el.parentNode.removeChild(el);
            });

            const boss = document.createElement('a-octahedron');
            boss.setAttribute('radius', '0.8');
            boss.setAttribute('color', '#ff0044');
            boss.setAttribute('material', 'emissive', '#ff0000');
            boss.setAttribute('material', 'emissiveIntensity', '1');
            boss.setAttribute('position', '0 1.5 -2');
            boss.setAttribute('class', 'boss');
            boss.setAttribute('id', 'current-boss');

            boss.setAttribute('animation__scale', {
                property: 'scale',
                from: '1 1 1',
                to: '1.2 1.2 1.2',
                dir: 'alternate',
                dur: 500,
                loop: true
            });

            boss.setAttribute('animation__rotation', {
                property: 'rotation',
                from: '0 0 0',
                to: '0 360 0',
                dur: 3000,
                loop: true
            });

            sceneEl.appendChild(boss);

            const bossAttackInterval = setInterval(() => {
                if (!bossActive || !document.getElementById('current-boss')) {
                    clearInterval(bossAttackInterval);
                    return;
                }
                spawnBossProjectile();
            }, 1500);
        }

        function spawnBossProjectile() {
            if (!sceneEl) return;
            const ball = document.createElement('a-sphere');
            ball.setAttribute('radius', '0.2');
            ball.setAttribute('color', '#ff0000');
            ball.setAttribute('material', 'emissive', '#ff0044');
            ball.setAttribute('material', 'emissiveIntensity', '1');
            ball.setAttribute('position', '0 1.5 -2');
            ball.setAttribute('class', 'projectile');
            ball.setAttribute('data-parried', 'false');

            const targetX = Math.random() * 2 - 1;
            const targetY = Math.random() * 1.5 + 0.3;

            ball.setAttribute('animation', {
                property: 'position',
                from: '0 1.5 -2',
                to: `${targetX} ${targetY} 0.5`,
                dur: 1500,
                easing: 'linear'
            });

            sceneEl.appendChild(ball);

            setTimeout(() => {
                if (ball.parentNode && ball.getAttribute('data-parried') !== 'true') {
                    ball.parentNode.removeChild(ball);
                }
            }, 1500);
        }

        function hitBoss(isRightHand) {
            if (!bossActive) return;

            const now = Date.now();
            const timeSinceLastHit = now - bossLastHitTime;

            if (bossHitCount > 0 && timeSinceLastHit > 300 && timeSinceLastHit < 1000) {
                if (isRightHand !== swingRhythmRight) {
                    swingRhythmRight = isRightHand;
                    bossLastHitTime = now;
                    bossHitCount++;

                    const damage = 15 + bossHitCount * 2;
                    bossHP -= damage;
                    if (bossHPFill) bossHPFill.style.width = bossHP + '%';

                    updateScore(damage * 2);
                    updateEnergy(5);

                    const boss = document.getElementById('current-boss');
                    if (boss) {
                        boss.setAttribute('material', 'emissiveIntensity', '2');
                        setTimeout(() => {
                            if (boss) boss.setAttribute('material', 'emissiveIntensity', '1');
                        }, 100);
                    }

                    if (bossHitCount >= 5) {
                        showMessage('🔥 完美节奏！', 1500);
                    }

                    if (bossHP <= 0) {
                        defeatBoss();
                    }
                } else {
                    bossHitCount = 0;
                    showMessage('❌ 要交替双手！', 1000);
                }
            } else if (bossHitCount === 0 || timeSinceLastHit > 1000) {
                swingRhythmRight = isRightHand;
                bossLastHitTime = now;
                bossHitCount = 1;
                bossHP -= 8;
                if (bossHPFill) bossHPFill.style.width = bossHP + '%';
                updateScore(10);
                updateEnergy(3);
            }

            if (bossHP <= 0) {
                defeatBoss();
            }
        }

        function defeatBoss() {
            bossActive = false;
            bossHP = 0;
            if (bossHPFill) bossHPFill.style.width = '0%';
            energy = 0;
            if (energyFill) energyFill.style.width = '0%';

            const boss = document.getElementById('current-boss');
            if (boss && sceneEl) {
                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement('a-sphere');
                    particle.setAttribute('radius', '0.08');
                    particle.setAttribute('color', '#ffaa00');
                    const pos = boss.getAttribute('position');
                    particle.setAttribute('position', pos);
                    particle.setAttribute('material', 'emissive', '#ff6600');
                    particle.setAttribute('material', 'emissiveIntensity', '1');
                    particle.setAttribute('animation', {
                        property: 'position',
                        from: pos,
                        to: `${pos.x + Math.random() * 4 - 2} ${pos.y + Math.random() * 3} ${pos.z + Math.random() * 3 - 1.5}`,
                        dur: 1000,
                        easing: 'easeOutQuad'
                    });
                    sceneEl.appendChild(particle);
                    setTimeout(() => {
                        if (particle.parentNode) particle.parentNode.removeChild(particle);
                    }, 1000);
                }
                boss.parentNode.removeChild(boss);
            }

            if (bossHPBar) bossHPBar.style.display = 'none';
            if (bossName) bossName.style.display = 'none';
            updateScore(100);
            showMessage('🎉 Boss 击败！', 3000);
        }

        // 碰撞检测循环
        setInterval(() => {
            if (!gameRunning || !sceneEl) return;

            const leftHand = document.getElementById('left-hand');
            const rightHand = document.getElementById('right-hand');
            if (!leftHand || !rightHand) return;

            const leftPos = leftHand.getAttribute('position');
            const rightPos = rightHand.getAttribute('position');
            if (!leftPos || !rightPos) return;

            document.querySelectorAll('.enemy').forEach(enemy => {
                const enemyPos = enemy.getAttribute('position');
                if (!enemyPos) return;
                const distLeft = distance(leftPos, enemyPos);
                const distRight = distance(rightPos, enemyPos);

                if (distLeft < 0.5 || distRight < 0.5) {
                    enemy.setAttribute('data-hit', 'true');
                    if (enemy.parentNode) enemy.parentNode.removeChild(enemy);
                    updateScore(10);
                    updateEnergy(8);
                    spawnHitEffect(enemyPos);
                }
            });

            document.querySelectorAll('.projectile').forEach(proj => {
                if (proj.getAttribute('data-parried') === 'true') return;
                const projPos = proj.getAttribute('position');
                if (!projPos) return;
                const distLeft = distance(leftPos, projPos);
                const distRight = distance(rightPos, projPos);

                if (distLeft < 0.4 || distRight < 0.4) {
                    proj.setAttribute('data-parried', 'true');
                    proj.removeAttribute('animation');
                    proj.setAttribute('animation', {
                        property: 'position',
                        from: `${projPos.x} ${projPos.y} ${projPos.z}`,
                        to: '0 1.5 -3',
                        dur: 800,
                        easing: 'easeInQuad'
                    });
                    proj.setAttribute('color', '#00ff88');
                    proj.setAttribute('material', 'emissive', '#00ff44');

                    updateScore(20);
                    updateEnergy(5);
                    showCombo();

                    if (bossActive && document.getElementById('current-boss')) {
                        setTimeout(() => {
                            if (proj.parentNode) {
                                proj.parentNode.removeChild(proj);
                                hitBoss(Math.random() > 0.5);
                            }
                        }, 800);
                    } else {
                        setTimeout(() => {
                            if (proj.parentNode) proj.parentNode.removeChild(proj);
                        }, 800);
                    }
                }
            });

            if (bossActive) {
                const boss = document.getElementById('current-boss');
                if (boss) {
                    const bossPos = boss.getAttribute('position');
                    if (!bossPos) return;
                    const distLeft = distance(leftPos, bossPos);
                    const distRight = distance(rightPos, bossPos);

                    if (distLeft < 0.7) hitBoss(false);
                    if (distRight < 0.7) hitBoss(true);
                }
            }
        }, 50);

        function distance(p1, p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dz = p1.z - p2.z;
            return Math.sqrt(dx*dx + dy*dy + dz*dz);
        }

        function spawnHitEffect(pos) {
            if (!sceneEl) return;
            const effect = document.createElement('a-sphere');
            effect.setAttribute('radius', '0.1');
            effect.setAttribute('color', '#ffff00');
            effect.setAttribute('position', pos);
            effect.setAttribute('material', 'emissive', '#ffaa00');
            effect.setAttribute('material', 'emissiveIntensity', '1');
            effect.setAttribute('animation', {
                property: 'scale',
                from: '1 1 1',
                to: '3 3 3',
                dur: 300,
                easing: 'easeOutQuad'
            });
            sceneEl.appendChild(effect);
            setTimeout(() => {
                if (effect.parentNode) effect.parentNode.removeChild(effect);
            }, 300);
        }
    </script>

    <a-scene background="color: #0a0a1a" vr-mode-ui="enabled: true">
        <!-- 灯光 -->
        <a-light type="ambient" color="#222244" intensity="0.5"></a-light>
        <a-light type="point" color="#4488ff" position="0 3 -2" intensity="0.8"></a-light>

        <!-- 地面与网格 -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#111133" material="emissive: #111133"></a-plane>
        <a-grid position="0 0.01 0" rotation="-90 0 0" width="20" height="20" color="#3333aa" opacity="0.3"></a-grid>

        <!-- 背景星星 -->
        <a-entity position="0 3 -4">
            <a-entity particle-system="preset: dust; particleCount: 100; color: #ffffff; size: 0.03; maxAge: 10"></a-entity>
        </a-entity>

        <!-- 左手光剑 -->
        <a-entity id="left-hand" hand-controls="hand: left">
            <a-entity position="0 0 -0.2" rotation="0 0 0">
                <a-cylinder radius="0.04" height="0.8" color="#00ccff" material="emissive: #0066ff; emissiveIntensity: 0.8"></a-cylinder>
                <a-cylinder radius="0.06" height="0.15" position="0 0.4 0" color="#ffffff" material="emissive: #00ccff; emissiveIntensity: 1"></a-cylinder>
            </a-entity>
        </a-entity>

        <!-- 右手光剑 -->
        <a-entity id="right-hand" hand-controls="hand: right">
            <a-entity position="0 0 -0.2" rotation="0 0 0">
                <a-cylinder radius="0.04" height="0.8" color="#ff4444" material="emissive: #cc0000; emissiveIntensity: 0.8"></a-cylinder>
                <a-cylinder radius="0.06" height="0.15" position="0 0.4 0" color="#ffffff" material="emissive: #ff4444; emissiveIntensity: 1"></a-cylinder>
            </a-entity>
        </a-entity>

        <!-- 摄像机 -->
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
</body>
</html>
